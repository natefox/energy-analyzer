name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test

      - run: npm run build
        env:
          BASE_PATH: /energy-analyzer

      # Preserve existing PR previews when deploying main
      - name: Fetch existing previews
        run: |
          git fetch origin gh-pages:gh-pages || true
          if git rev-parse --verify gh-pages >/dev/null 2>&1; then
            mkdir -p out/pr-preview
            git checkout gh-pages -- pr-preview/ 2>/dev/null || true
            cp -r pr-preview/* out/pr-preview/ 2>/dev/null || true
          fi

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
