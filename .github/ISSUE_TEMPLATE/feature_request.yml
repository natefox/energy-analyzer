name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make Energy Analyzer better? We'd love to hear it.

  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the app does this relate to?
      options:
        - Compare Plans page
        - Analyze Usage page
        - New utility support
        - Rate plan data
        - Charts / visualizations
        - Solar / generation
        - Battery / storage
        - Recommendations
        - Infrastructure / deployment
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What would you like?
      description: Describe the feature or improvement. What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: sample-data
    attributes:
      label: Sample CSV Data
      description: |
        **Strongly recommended if your request involves calculations, parsing, or a new utility.** Paste a few rows of CSV data that illustrate your use case. Redact personal info — we only need the format, dates, times, and values.
      placeholder: |
        Paste CSV rows here, or describe the format if you don't have sample data.
      render: text

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any workarounds or alternative approaches?
